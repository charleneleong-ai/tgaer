name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Pinned to the version in pyproject.toml's dev deps; excludes live in [tool.ruff].
      - run: uvx ruff@0.15.13 check .
      - run: uvx ruff@0.15.13 format --check .
